name: CI Pipeline

on:
  push:
    branches: [ main, master, zadanie2, lab6 ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: photoprint
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Create test configuration
        run: |
          mkdir -p src/test/resources
          cat > src/test/resources/application-ci.yml << 'EOF'
          spring:
            datasource:
              url: jdbc:postgresql://localhost:5432/photoprint
              username: postgres
              password: password
              driver-class-name: org.postgresql.Driver
            jpa:
              hibernate:
                ddl-auto: create-drop
              show-sql: false
            sql:
              init:
                mode: never

          server:
            port: 8081
            ssl:
              enabled: false

          logging:
            level:
              root: WARN
              org.springframework: WARN
              com.example.photoprintapplication1: DEBUG
          EOF

          echo "Test configuration created successfully"

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to start..."
          for i in {1..15}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            echo "PostgreSQL not ready yet... (attempt $i/15)"
            sleep 3
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Run tests
        run: mvn -B clean test -Dspring.profiles.active=ci
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Build JAR
        if: success()
        run: mvn -B clean package -DskipTests
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: List build artifacts
        run: |
          echo "Build artifacts:"
          ls -la target/*.jar 2>/dev/null || echo "No JAR files found"

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: photoprint-application
          path: target/*.jar
          retention-days: 7