name: CI Pipeline

on:
  push:
    branches: [ main, master, zadanie2 ]
  pull_request:
    branches: [ main, master, zadanie2 ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: photoprint
          POSTGRES_USER: ${{ secrets.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Create test configuration
        run: |
          mkdir -p src/test/resources
          cat > src/test/resources/application-ci.yml << 'EOF'
          spring:
            datasource:
              url: jdbc:postgresql://localhost:5432/photoprint
              username: ${{ secrets.DB_USERNAME }}
              password: ${{ secrets.DB_PASSWORD }}
              driver-class-name: org.postgresql.Driver
            jpa:
              hibernate:
                ddl-auto: create-drop
            ssl:
              enabled: false

          server:
            port: 8081
            ssl:
              enabled: false

          jwt:
            secret: ${{ secrets.JWT_SECRET }}

          signature:
            keystore.path: classpath:certs/signature/signature-keystore.p12
            keystore.password: ${{ secrets.KEYSTORE_PASSWORD }}
            key.alias: signature-key-1bib23336

          logging:
            level:
              root: WARN
              org.springframework: ERROR
          EOF

      - name: Run tests
        run: mvn -B clean test -Dspring.profiles.active=ci
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNATURE_KEYSTORE_PASSWORD: ${{ secrets.SIGNATURE_KEYSTORE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SPRING_PROFILES_ACTIVE: ci

      - name: Build JAR
        if: success()
        run: mvn -B clean package -DskipTests
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNATURE_KEYSTORE_PASSWORD: ${{ secrets.SIGNATURE_KEYSTORE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
